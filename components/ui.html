<div class="top-row">
    <div class="title-box hud-panel">
        <h1>نواة الذكاء البصري</h1>
        <div class="subtitle">Neural Brain Interface Modular</div>
    </div>
    <div class="sys-data hud-panel">
        <div class="data-item"><span class="data-val" id="fps-val">60</span><span class="data-label">FPS RATE</span>
        </div>
        <div class="data-item"><span class="data-val" id="particles-val">262K</span><span
                class="data-label">ENTITIES</span></div>
        <div class="data-item"><span class="data-val" id="mode-val">CALM</span><span class="data-label">SYS STATE</span>
        </div>
        <div class="data-item"><span class="data-val" id="audio-val">OFF</span><span class="data-label">MIC LINK</span>
        </div>
    </div>
</div>
<div class="bottom-row">
    <div class="ai-log hud-panel">
        <div class="ai-log-title">LIVE NLP TRANSCRIPT</div>
        <div id="ai-speech-text">...في انتظار الأوامر الصوتية</div>
        <div id="ai-intent">INTENT: [NONE] | ENGAGING: FALSE</div>
        <div id="debug-log"></div>
    </div>
    <div class="btn-group">
        <button id="btn-mic">🎙️ ربط الشبكة العصبية</button>
        <button id="btn-record">🔴 تسجيل مرئي</button>
        <button id="btn-screenshot">📸 لقطة بيانات</button>
    </div>
</div>
