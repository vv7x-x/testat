<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gesture Controlled 3D Particle System</title>
  <style>
    body { margin:0; overflow:hidden; background:black; }
    canvas { display:block; }
    video { display:none; }
  </style>
</head>
<body>

<video id="video" autoplay playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 5;

let renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

let particles;
let geometry;
let material;

const PARTICLE_COUNT = 3000;
let positions = new Float32Array(PARTICLE_COUNT * 3);

function createGeometry(template="heart") {

    for(let i=0;i<PARTICLE_COUNT;i++) {

        let t = Math.random() * Math.PI * 2;
        let r = Math.random();

        let x=0,y=0,z=0;

        if(template==="heart"){
            x = 16 * Math.pow(Math.sin(t),3);
            y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
            z = (Math.random()-0.5)*5;
        }

        if(template==="flower"){
            let k = 5;
            r = Math.sin(k*t);
            x = r * Math.cos(t)*5;
            y = r * Math.sin(t)*5;
            z = (Math.random()-0.5)*3;
        }

        if(template==="saturn"){
            x = Math.cos(t)*5;
            y = Math.sin(t)*5;
            z = (Math.random()-0.5)*1;
        }

        if(template==="fireworks"){
            let phi = Math.random()*Math.PI*2;
            let costheta = Math.random()*2-1;
            let u = Math.random();
            let theta = Math.acos(costheta);
            let r = Math.cbrt(u)*5;
            x = r*Math.sin(theta)*Math.cos(phi);
            y = r*Math.sin(theta)*Math.sin(phi);
            z = r*Math.cos(theta);
        }

        positions[i*3] = x*0.1;
        positions[i*3+1] = y*0.1;
        positions[i*3+2] = z*0.1;
    }

    geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions,3));

    material = new THREE.PointsMaterial({
        size:0.05,
        color:0xffffff
    });

    if(particles) scene.remove(particles);

    particles = new THREE.Points(geometry,material);
    scene.add(particles);
}

createGeometry("heart");

let expansion = 1;

function animate(){
    requestAnimationFrame(animate);

    particles.rotation.y += 0.002;
    particles.scale.set(expansion, expansion, expansion);

    renderer.render(scene,camera);
}
animate();


// ----------------------
// HAND TRACKING
// ----------------------

const video = document.getElementById('video');

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
    video.srcObject = stream;
});

const hands = new Hands({
    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands:1,
    modelComplexity:1,
    minDetectionConfidence:0.7,
    minTrackingConfidence:0.7
});

hands.onResults(results => {

    if(results.multiHandLandmarks.length > 0){

        let lm = results.multiHandLandmarks[0];

        let thumb = lm[4];
        let index = lm[8];

        // PINCH DISTANCE
        let dx = thumb.x - index.x;
        let dy = thumb.y - index.y;
        let dist = Math.sqrt(dx*dx+dy*dy);

        expansion = 1 + (1-dist)*3;

        // COLOR BASED ON HEIGHT
        let hue = lm[0].y * 360;
        material.color.setHSL(hue/360,1,0.5);

        // COUNT FINGERS
        let fingersUp = 0;
        for(let tip of [8,12,16,20]){
            if(lm[tip].y < lm[tip-2].y) fingersUp++;
        }

        if(fingersUp===1) createGeometry("heart");
        if(fingersUp===2) createGeometry("flower");
        if(fingersUp===3) createGeometry("saturn");
        if(fingersUp>=4) createGeometry("fireworks");
    }
});

const cameraFeed = new Camera(video,{
    onFrame: async ()=>{ await hands.send({image:video}); },
    width:640,
    height:480
});
cameraFeed.start();

</script>
</body>
</html>
