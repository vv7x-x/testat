<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الواجهة الكونية العصبية</title>
    <style>
        :root {
            --primary: #8a2be2;
            --secondary: #00ffff;
            --bg-dark: #020205;
            --text-main: #ffffff;
            --font-main: "Tajawal", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: var(--font-main);
            color: var(--text-main);
            user-select: none;
            -webkit-user-select: none;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        video {
            display: none;
        }

        /* Cinematic UI Layer */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            box-sizing: border-box;
            transition: opacity 1s ease;
        }

        .hud-panel {
            background: rgba(10, 5, 20, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            pointer-events: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .header-title h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
            line-height: 1.2;
        }

        .subtitle {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
            letter-spacing: 1px;
        }

        .controls-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-group label {
            font-size: 0.8rem;
            color: #ccc;
        }

        .control-group input[type=range] {
            width: 120px;
            accent-color: var(--secondary);
        }

        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            pointer-events: auto;
            flex-wrap: wrap;
        }

        button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 10px 20px;
            border-radius: 6px;
            font-family: var(--font-main);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        button:hover,
        button.active {
            background: rgba(0, 255, 255, 0.15);
            border-color: var(--secondary);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* Loading Screen */
        #loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--secondary);
            animation: spin 1s infinite linear;
            margin-bottom: 20px;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .hidden {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* Hidden canvas for text rendering */
        #text-canvas {
            display: none;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
</head>

<body>

    <div id="loader">
        <div class="spinner"></div>
        <h2 style="font-weight: 300; letter-spacing: 2px;">يتم تهيئة المحرك الكوني...</h2>
    </div>

    <div id="ui-layer" class="hidden">
        <div class="top-bar">
            <div class="header-title hud-panel">
                <h1>الواجهة الكونية العصبية</h1>
                <div class="subtitle">نظام تفاعلي بالصوت والصورة المعززة</div>

                <div class="controls-container">
                    <div class="control-group">
                        <label>قوة الانفجار</label>
                        <input type="range" id="ctrl-force" min="0" max="100" value="50">
                    </div>
                    <div class="control-group">
                        <label>شدة الوهج (Bloom)</label>
                        <input type="range" id="ctrl-bloom" min="0" max="300" value="150">
                    </div>
                    <div class="control-group">
                        <label>حساسية الميكروفون</label>
                        <input type="range" id="ctrl-mic" min="10" max="200" value="100">
                    </div>
                </div>
            </div>
            <div class="header-title hud-panel" style="text-align: left;">
                <div id="fps-display" style="color: var(--secondary); font-size: 1.5rem; font-weight: bold;">60 FPS
                </div>
                <div id="mode-display" style="color: #aaa; font-size: 0.8rem;">وضع التكوين الكوني</div>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="hud-panel" style="max-width: 400px; color: #ddd; font-size: 0.85rem; line-height: 1.6;">
                <strong>التحكم:</strong><br>
                🎤 فعل الميكروفون وتحدث لتشكيل الحروف بالنجوم.<br>
                💥 قل <b>"انفجار"</b> أو <b>"قوة"</b> لتدمير النجوم.<br>
                ✋ استخدم الكاميرا لتحريك النجوم بيدك.<br>
                👁️ يتم الانتقال بين الأوضاع تلقائياً بصياغة ناعمة.
            </div>

            <div class="action-buttons">
                <button id="btn-mic">🎙️ تفعيل الميكروفون / الأوامر الصوتية</button>
                <button id="btn-record">🔴 تسجيل 30 ثانية</button>
                <button id="btn-export">📸 لقطة 4K</button>
                <button id="btn-cinema">🎬 الوضع السينمائي</button>
            </div>
        </div>
    </div>

    <!-- For Speech to Particles -->
    <canvas id="text-canvas" width="1024" height="1024"></canvas>
    <video id="video"></video>

    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/misc/GPUComputationRenderer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <!-- Shaders -->
    <script type="x-shader/x-fragment" id="compute-position">
        uniform float uTime;
        uniform float uDelta;
        void main() {
            vec2 uv = gl_FragCoord.xy / resolution.xy;
            vec4 tmpPos = texture2D(texturePosition, uv);
            vec3 pos = tmpPos.xyz;
            vec4 tmpVel = texture2D(textureVelocity, uv);
            vec3 vel = tmpVel.xyz;
            
            pos += vel * uDelta;
            
            gl_FragColor = vec4(pos, 1.0);
        }
    </script>

    <script type="x-shader/x-fragment" id="compute-velocity">
        uniform float uTime;
        uniform float uDelta;
        uniform vec3 uTarget; // Dynamic attractor
        uniform sampler2D uTextTarget;
        uniform int uMode; // 0: Flow, 1: Text, 2: Explosion
        uniform vec3 uAudioData;
        
        uniform vec3 uHand1;
        uniform float uHandForce;

        vec3 curlNoise(vec3 p) {
            float n1 = sin(p.y*2.0) + cos(p.z*2.0);
            float n2 = sin(p.z*2.0) + cos(p.x*2.0);
            float n3 = sin(p.x*2.0) + cos(p.y*2.0);
            return vec3(n1, n2, n3);
        }

        void main() {
            vec2 uv = gl_FragCoord.xy / resolution.xy;
            vec4 tmpPos = texture2D(texturePosition, uv);
            vec3 pos = tmpPos.xyz;
            vec4 tmpVel = texture2D(textureVelocity, uv);
            vec3 vel = tmpVel.xyz;

            vec3 force = vec3(0.0);

            // Shape Logic
            if (uMode == 0) {
                // Galaxy Spiral
                float angle = uv.x * 20.0 + uTime * 0.5;
                float radius = uv.y * 20.0;
                vec3 target = vec3(cos(angle)*radius, (uv.y - 0.5)*5.0, sin(angle)*radius);
                force += (target - pos) * 0.5;
            } else if (uMode == 1) {
                // Text Target Shape from Texture
                vec4 tData = texture2D(uTextTarget, uv);
                vec3 target = tData.xyz; 
                // tData.w is 1.0 if part of text
                if(tData.w > 0.0) {
                    force += (target - pos) * 2.0;
                } else {
                    // Wander gently if not attached
                    force += curlNoise(pos * 0.1 + uTime * 0.2) * 2.0;
                    force += (-pos * 0.1); // pull to center
                }
            } else if (uMode == 2) {
                // Explosion
                vec3 dir = normalize(pos + vec3(0.001));
                force += dir * 50.0;
            }

            // Audio Influence (Bass -> Repel/Expand)
            if(uAudioData.x > 0.6) { // Beat
                force += normalize(pos) * (uAudioData.x * 20.0);
            }

            // Hand Influence
            vec3 hDir = uHand1 - pos;
            float hDist = length(hDir);
            if(hDist < 10.0) {
                force += normalize(hDir) * (10.0 - hDist) * uHandForce * 2.0;
            }

            // Turbulence
            force += curlNoise(pos * 0.5 + uTime) * (1.0 + uAudioData.y * 2.0);

            vel += force * uDelta;
            vel *= 0.92; // Friction

            float maxSpeed = 30.0;
            if (length(vel) > maxSpeed) vel = normalize(vel) * maxSpeed;

            gl_FragColor = vec4(vel, 1.0);
        }
    </script>

    <script type="x-shader/x-vertex" id="render-vs">
        uniform sampler2D texturePosition;
        uniform sampler2D textureVelocity;
        uniform float uHueShift;
        
        varying vec4 vColor;

        vec3 hueShift(vec3 color, float hue) {
            const vec3 k = vec3(0.57735, 0.57735, 0.57735);
            float cosAngle = cos(hue);
            return vec3(color * cosAngle + cross(k, color) * sin(hue) + k * dot(k, color) * (1.0 - cosAngle));
        }

        void main() {
            vec4 posData = texture2D(texturePosition, position.xy);
            vec3 pos = posData.xyz;
            vec4 velData = texture2D(textureVelocity, position.xy);
            
            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_PointSize = 6.0 / -mvPosition.z;
            gl_Position = projectionMatrix * mvPosition;

            float speed = length(velData.xyz);
            vec3 color = mix(vec3(0.5, 0.0, 1.0), vec3(0.0, 1.0, 1.0), min(speed * 0.1, 1.0));
            color = hueShift(color, uHueShift);

            vColor = vec4(color, 0.8 + speed * 0.02);
        }
    </script>
    <script type="x-shader/x-fragment" id="render-fs">
        varying vec4 vColor;
        void main() {
            vec2 cxy = 2.0 * gl_PointCoord - 1.0;
            float r = dot(cxy, cxy);
            if (r > 1.0) discard;
            float glow = exp(-r * 3.0);
            gl_FragColor = vec4(vColor.rgb * glow * 1.5, vColor.a * glow);
        }
    </script>

    <!-- App Logic -->
    <script>
        const FBO_WIDTH = 512; // 262k

        class CoreEngine {
            constructor() {
                this.initThree();
                this.initGPGPU();
                this.initAudio();
                this.initSpeech();
                this.initMediaPipe();
                this.initUI();

                this.clock = new THREE.Clock();
                this.textCanvas = document.getElementById('text-canvas');
                this.textCtx = this.textCanvas.getContext('2d');
                this.textTexture = new THREE.DataTexture(new Float32Array(FBO_WIDTH * FBO_WIDTH * 4), FBO_WIDTH, FBO_WIDTH, THREE.RGBAFormat, THREE.FloatType);
                this.textTexture.needsUpdate = true;

                this.state = {
                    mode: 0,
                    audioData: new THREE.Vector3(),
                    handPos: new THREE.Vector3(0, 0, 0),
                    handForce: 1.0,
                    explosionTimer: 0,
                    customColor: null
                };

                this.animate();
                document.getElementById('loader').style.display = 'none';
                document.getElementById('ui-layer').classList.remove('hidden');
            }

            initThree() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.z = 30;

                this.renderer = new THREE.WebGLRenderer({ antialias: false, preserveDrawingBuffer: true }); // needed for export
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                document.body.appendChild(this.renderer.domElement);

                this.composer = new THREE.EffectComposer(this.renderer);
                this.composer.addPass(new THREE.RenderPass(this.scene, this.camera));

                this.bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
                this.composer.addPass(this.bloomPass);

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                    this.composer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            initGPGPU() {
                this.gpuCompute = new GPUComputationRenderer(FBO_WIDTH, FBO_WIDTH, this.renderer);
                const dtPos = this.gpuCompute.createTexture();
                const dtVel = this.gpuCompute.createTexture();

                // Init positions in space
                const pArr = dtPos.image.data;
                for (let i = 0; i < pArr.length; i += 4) {
                    pArr[i] = (Math.random() - 0.5) * 50;
                    pArr[i + 1] = (Math.random() - 0.5) * 50;
                    pArr[i + 2] = (Math.random() - 0.5) * 50;
                    pArr[i + 3] = 1.0;
                }

                this.posVar = this.gpuCompute.addVariable("texturePosition", document.getElementById('compute-position').textContent, dtPos);
                this.velVar = this.gpuCompute.addVariable("textureVelocity", document.getElementById('compute-velocity').textContent, dtVel);

                this.gpuCompute.setVariableDependencies(this.posVar, [this.posVar, this.velVar]);
                this.gpuCompute.setVariableDependencies(this.velVar, [this.posVar, this.velVar]);

                this.velUniforms = this.velVar.material.uniforms;
                this.velUniforms.uTime = { value: 0 };
                this.velUniforms.uDelta = { value: 0 };
                this.velUniforms.uMode = { value: 0 };
                this.velUniforms.uAudioData = { value: new THREE.Vector3() };
                this.velUniforms.uHand1 = { value: new THREE.Vector3() };
                this.velUniforms.uHandForce = { value: 1.0 };

                // Texture for text target mode
                this.velUniforms.uTextTarget = { value: this.textTexture };

                this.posVar.material.uniforms.uTime = { value: 0 };
                this.posVar.material.uniforms.uDelta = { value: 0 };

                this.gpuCompute.init();

                const geo = new THREE.BufferGeometry();
                const uvs = new Float32Array(FBO_WIDTH * FBO_WIDTH * 3);
                let p = 0;
                for (let i = 0; i < FBO_WIDTH; i++) {
                    for (let j = 0; j < FBO_WIDTH; j++) {
                        uvs[p++] = (i + 0.5) / FBO_WIDTH;
                        uvs[p++] = (j + 0.5) / FBO_WIDTH;
                        uvs[p++] = 0;
                    }
                }
                geo.setAttribute('position', new THREE.BufferAttribute(uvs, 3));

                this.particleMat = new THREE.ShaderMaterial({
                    vertexShader: document.getElementById('render-vs').textContent,
                    fragmentShader: document.getElementById('render-fs').textContent,
                    uniforms: {
                        texturePosition: { value: null },
                        textureVelocity: { value: null },
                        uHueShift: { value: 0 }
                    },
                    transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
                });

                this.particleMesh = new THREE.Points(geo, this.particleMat);
                this.scene.add(this.particleMesh);
            }

            initAudio() {
                this.audioActive = false;
                document.getElementById('btn-mic').onclick = async () => {
                    if (!this.audioCtx) {
                        try {
                            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                            this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                            this.analyser = this.audioCtx.createAnalyser();
                            this.analyser.fftSize = 256;
                            this.audioCtx.createMediaStreamSource(stream).connect(this.analyser);
                            this.freqData = new Uint8Array(this.analyser.frequencyBinCount);
                            this.audioActive = true;
                            if (this.recognition) this.recognition.start();
                            document.getElementById('btn-mic').classList.add('active');
                        } catch (e) { alert("يجب السماح بالصوت لاستخدام هذه الميزة"); }
                    } else {
                        if (this.audioActive) {
                            this.audioCtx.suspend(); this.audioActive = false;
                            if (this.recognition) this.recognition.stop();
                            document.getElementById('btn-mic').classList.remove('active');
                        } else {
                            this.audioCtx.resume(); this.audioActive = true;
                            if (this.recognition) this.recognition.start();
                            document.getElementById('btn-mic').classList.add('active');
                        }
                    }
                };
            }

            initSpeech() {
                window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (window.SpeechRecognition) {
                    this.recognition = new window.SpeechRecognition();
                    this.recognition.lang = 'ar-SA';
                    this.recognition.continuous = true;
                    this.recognition.interimResults = true;

                    this.recognition.onresult = (e) => {
                        let text = '';
                        for (let i = e.resultIndex; i < e.results.length; ++i) {
                            text += e.results[i][0].transcript;
                        }

                        this.processSpokenText(text);

                        // Trigger magic keywords
                        if (text.includes('انفجار') || text.includes('قوة') || text.includes('explosion')) {
                            this.triggerExplosion();
                        }

                        // Personal name Easter Egg (User change requested: "عند نطق اسمي...")
                        if (text.includes('اسمي') || text.includes('أحمد') || text.includes('محمد') || text.includes('طارق')) { // Add targeted names
                            this.particleMat.uniforms.uHueShift.value += 1.0; // Flash universe color
                        }
                    };

                    this.recognition.onend = () => {
                        if (this.audioActive) {
                            try { this.recognition.start(); } catch (err) { }
                        } else {
                            this.state.mode = 0; // Back to flow
                        }
                    };
                }
            }

            processSpokenText(text) {
                // Render text into canvas to generate particle targets
                this.state.mode = 1; // Text mode
                document.getElementById('mode-display').innerText = "وضع تشكيل الحروف";

                this.textCtx.fillStyle = 'black';
                this.textCtx.fillRect(0, 0, 1024, 1024);
                this.textCtx.fillStyle = 'white';
                this.textCtx.font = 'bold 200px Tajawal';
                this.textCtx.textAlign = 'center';
                this.textCtx.textBaseline = 'middle';

                // Wrap text if needed, simplifies logic to just center it
                this.textCtx.fillText(text, 512, 512);

                const imgData = this.textCtx.getImageData(0, 0, 1024, 1024).data;
                const texData = this.textTexture.image.data;

                // Randomly assign particles to bright text pixels
                let pIdx = 0;
                let validPixels = [];
                for (let i = 0; i < imgData.length; i += 4) {
                    if (imgData[i] > 100) {
                        let idx = i / 4;
                        validPixels.push({ x: (idx % 1024), y: Math.floor(idx / 1024) });
                    }
                }

                if (validPixels.length > 0) {
                    for (let i = 0; i < texData.length; i += 4) {
                        let rp = validPixels[Math.floor(Math.random() * validPixels.length)];
                        // Map 1024x1024 to 3D Space (-20 to 20 approx)
                        texData[i] = (rp.x - 512) * 0.05;
                        texData[i + 1] = -(rp.y - 512) * 0.05;
                        texData[i + 2] = (Math.random() - 0.5) * 2.0; // slight Z depth
                        texData[i + 3] = 1.0; // active flag
                    }
                } else {
                    for (let i = 0; i < texData.length; i += 4) texData[i + 3] = 0.0;
                }

                this.textTexture.needsUpdate = true;

                // Clear text mode after delay if not speaking
                clearTimeout(this.textTimeout);
                this.textTimeout = setTimeout(() => {
                    this.state.mode = 0;
                    document.getElementById('mode-display').innerText = "التدفق الكوني المتصل";
                }, 3000);
            }

            triggerExplosion() {
                this.state.mode = 2;
                document.getElementById('mode-display').innerText = "الانفجار العظيم";
                let expForce = document.getElementById('ctrl-force').value / 100;
                this.bloomPass.strength = 3.0 * expForce;

                clearTimeout(this.textTimeout);
                setTimeout(() => {
                    this.state.mode = 0;
                    document.getElementById('mode-display').innerText = "التدفق الكوني المتصل";
                }, 1000);
            }

            initMediaPipe() {
                const video = document.getElementById('video');
                const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
                hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6 });
                hands.onResults((res) => {
                    if (res.multiHandLandmarks?.length > 0) {
                        let lm = res.multiHandLandmarks[0];
                        // Map hand to 3D space
                        this.state.handPos.set((lm[9].x - 0.5) * 50, -(lm[9].y - 0.5) * 50, 0);

                        // Fist check
                        let open = 0;
                        for (let tip of [8, 12, 16, 20]) if (lm[tip].y < lm[tip - 2].y) open++;
                        this.state.handForce = (open === 0) ? -5.0 : 1.0; // Repel if fist, attract if open
                    } else {
                        this.state.handForce = 0.0;
                    }
                });

                // Ignore camera init failure gracefully
                try {
                    new Camera(video, { onFrame: async () => await hands.send({ image: video }), width: 640, height: 480 }).start();
                } catch (e) { }
            }

            initUI() {
                document.getElementById('btn-cinema').onclick = () => {
                    const ui = document.getElementById('ui-layer');
                    ui.classList.toggle('hidden');
                    if (document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen();
                    }
                };

                document.getElementById('btn-export').onclick = () => {
                    this.renderer.render(this.scene, this.camera); // ensure drawn
                    const link = document.createElement('a');
                    link.download = 'AstraCore-Snapshot.png';
                    link.href = this.renderer.domElement.toDataURL('image/png');
                    link.click();
                };

                let mediaRecorder, chunks = [];
                document.getElementById('btn-record').onclick = (e) => {
                    if (mediaRecorder && mediaRecorder.state === 'recording') return;
                    const stream = this.renderer.domElement.captureStream(60);
                    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                    mediaRecorder.ondataavailable = ev => chunks.push(ev.data);
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'video/webm' });
                        chunks = [];
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url; a.download = 'AstraCore-Record.webm';
                        a.click();
                        e.target.innerText = '🔴 تسجيل 30 ثانية';
                        e.target.style.color = '';
                    };
                    mediaRecorder.start();
                    e.target.innerText = 'يتم التسجيل...';
                    e.target.style.color = '#ff4444';
                    setTimeout(() => mediaRecorder.stop(), 30000);
                };
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                const dt = Math.min(this.clock.getDelta(), 0.1);
                const time = this.clock.getElapsedTime();

                // UI Linking
                this.bloomPass.strength += ((document.getElementById('ctrl-bloom').value / 100) - this.bloomPass.strength) * 0.1;

                // Audio analysis
                if (this.audioActive && this.analyser) {
                    this.analyser.getByteFrequencyData(this.freqData);
                    let b = 0, m = 0;
                    for (let i = 0; i < 5; i++) b += this.freqData[i];
                    for (let i = 20; i < 40; i++) m += this.freqData[i];
                    let micSens = document.getElementById('ctrl-mic').value / 100;
                    this.state.audioData.x = (b / 5 / 255) * micSens;
                    this.state.audioData.y = (m / 20 / 255) * micSens;

                    // Beat detect -> Auto Explosion
                    if (this.state.audioData.x > 0.8 && time > this.state.explosionTimer + 0.5) {
                        // mild bump
                        this.bloomPass.strength += 1.0;
                        this.state.explosionTimer = time;
                        this.particleMat.uniforms.uHueShift.value += 0.5;
                    }
                }

                // GPGPU Setup
                this.velUniforms.uTime.value = time;
                this.velUniforms.uDelta.value = dt;
                this.velUniforms.uMode.value = this.state.mode;
                this.velUniforms.uAudioData.value.copy(this.state.audioData);
                this.velUniforms.uHand1.value.copy(this.state.handPos);
                this.velUniforms.uHandForce.value = this.state.handForce;

                this.posVar.material.uniforms.uTime.value = time;
                this.posVar.material.uniforms.uDelta.value = dt;

                this.gpuCompute.compute();
                this.particleMat.uniforms.texturePosition.value = this.gpuCompute.getCurrentRenderTarget(this.posVar).texture;
                this.particleMat.uniforms.textureVelocity.value = this.gpuCompute.getCurrentRenderTarget(this.velVar).texture;
                this.particleMat.uniforms.uHueShift.value += dt * 0.1; // Slow color cycle

                // Camera breathing
                this.camera.position.x = Math.sin(time * 0.2) * 2.0;
                this.camera.position.y = Math.cos(time * 0.1) * 2.0;
                this.camera.lookAt(0, 0, 0);

                this.composer.render();

                // Track FPS
                document.getElementById('fps-display').innerText = Math.round(1 / dt) + ' FPS';
            }
        }

        window.onload = () => new CoreEngine();
    </script>
</body>
