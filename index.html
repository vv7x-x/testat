<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- HTTPS configuration for Vercel -->
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Neural Command Interface | Visual Brain System</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffff;
            --secondary: #8a2be2;
            --danger: #ff003c;
            --bg: #020205;
            --text: #e0eaff;
            --font: 'Tajawal', sans-serif;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: var(--bg);
            font-family: var(--font);
            color: var(--text);
            user-select: none;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        video {
            display: none;
        }

        #text-canvas {
            display: none;
        }

        /* UI Layer */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            box-sizing: border-box;
            transition: opacity 1s ease;
        }

        .hud-panel {
            background: rgba(5, 5, 15, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            pointer-events: auto;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .hud-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
            transition: background 0.5s;
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .title-box h1 {
            margin: 0;
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 15px var(--primary);
        }

        .title-box .subtitle {
            font-size: 0.8rem;
            color: var(--primary);
            letter-spacing: 4px;
            margin-top: 5px;
        }

        .sys-data {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            font-family: 'Courier New', Courier, monospace;
        }

        .data-item {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .data-val {
            font-size: 1.2rem;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
            font-weight: bold;
        }

        .data-label {
            font-size: 0.6rem;
            color: #888;
            font-family: var(--font);
            letter-spacing: 1px;
        }

        .bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .ai-log {
            max-width: 400px;
        }

        .ai-log-title {
            font-size: 0.7rem;
            color: var(--primary);
            letter-spacing: 2px;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            padding-bottom: 5px;
        }

        #ai-speech-text {
            font-size: 1.2rem;
            font-weight: 300;
            line-height: 1.5;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            min-height: 2em;
        }

        #ai-intent {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 10px;
            font-family: monospace;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.2);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 4px;
            font-family: var(--font);
            font-size: 0.8rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        button:hover,
        button.active {
            background: rgba(0, 255, 255, 0.2);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        /* Loading */
        #loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #020205;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s;
        }

        .core-spinner {
            width: 80px;
            height: 80px;
            border: 2px solid transparent;
            border-radius: 50%;
            border-top-color: var(--primary);
            border-bottom-color: var(--secondary);
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        /* Cinematic Title */
        #cinematic-title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 5;
            opacity: 0;
            pointer-events: none;
            transition: opacity 2s;
        }

        #cinematic-title h2 {
            font-size: 4rem;
            font-weight: 300;
            letter-spacing: 10px;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 30px var(--primary);
        }

        #cinematic-title p {
            font-size: 1rem;
            color: var(--primary);
            letter-spacing: 15px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .hidden {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* Dynamic Theme Colors via CSS vars */
        body.theme-combat {
            --primary: #ff003c;
            --secondary: #ff5500;
        }

        body.theme-analysis {
            --primary: #0088ff;
            --secondary: #00ffff;
        }

        body.theme-data {
            --primary: #00ff66;
            --secondary: #0088ff;
        }

        body.theme-yahya {
            --primary: #ffd700;
            --secondary: #ff00ff;
        }
    </style>

    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>

</head>

    <!-- GPGPU Compute Shaders -->
    <script type="x-shader/x-fragment" id="compute-pos">
        uniform float uDelta;
        void main() {
            vec2 uv = gl_FragCoord.xy / resolution.xy;
            vec3 pos = texture2D(texturePosition, uv).xyz;
            vec3 vel = texture2D(textureVelocity, uv).xyz;
            pos += vel * uDelta;
            gl_FragColor = vec4(pos, 1.0);
        }
    </script>
    <script type="x-shader/x-fragment" id="compute-vel">
        uniform float uTime;
        uniform float uDelta;
        uniform vec3 uTargetParams;
        uniform sampler2D uTextTex;
        uniform vec3 uAudioData;
        uniform vec3 uHand1;
        uniform vec3 uHand2;
        uniform float uHandDist1;
        uniform float uHandDist2;
        uniform int uIntent;

        vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
        vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
        float snoise(vec3 v) {
            const vec2 C = vec2(1.0/6.0, 1.0/3.0); const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
            vec3 i = floor(v + dot(v, C.yyy)); vec3 x0 = v - i + dot(i, C.xxx);
            vec3 g = step(x0.yzx, x0.xyz); vec3 l = 1.0 - g;
            vec3 i1 = min(g.xyz, l.zxy); vec3 i2 = max(g.xyz, l.zxy);
            vec3 x1 = x0 - i1 + C.xxx; vec3 x2 = x0 - i2 + C.yyy; vec3 x3 = x0 - D.yyy;
            i = mod289(i);
            vec4 p = permute(permute(permute(i.z + vec4(0.0, i1.z, i2.z, 1.0)) + i.y + vec4(0.0, i1.y, i2.y, 1.0)) + i.x + vec4(0.0, i1.x, i2.x, 1.0));
            float n_ = 0.142857142857; vec3 ns = n_ * D.wyz - D.xzx;
            vec4 j = p - 49.0 * floor(p * ns.z * ns.z); vec4 x_ = floor(j * ns.z); vec4 y_ = floor(j - 7.0 * x_);
            vec4 x = x_*ns.x + ns.yyyy; vec4 y = y_*ns.x + ns.yyyy; vec4 h = 1.0 - abs(x) - abs(y);
            vec4 b0 = vec4(x.xy, y.xy); vec4 b1 = vec4(x.zw, y.zw);
            vec4 s0 = floor(b0)*2.0 + 1.0; vec4 s1 = floor(b1)*2.0 + 1.0; vec4 sh = -step(h, vec4(0.0));
            vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy; vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
            vec3 p0 = vec3(a0.xy,h.x); vec3 p1 = vec3(a0.zw,h.y); vec3 p2 = vec3(a1.xy,h.z); vec3 p3 = vec3(a1.zw,h.w);
            vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
            p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
            vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
            return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
        }
        vec3 curlNoise(vec3 p) {
            float e = 0.1;
            float x = snoise(p + vec3(0, e, 0)) - snoise(p - vec3(0, e, 0)) - snoise(p + vec3(0, 0, e)) + snoise(p - vec3(0, 0, e));
            float y = snoise(p + vec3(0, 0, e)) - snoise(p - vec3(0, 0, e)) - snoise(p + vec3(e, 0, 0)) + snoise(p - vec3(e, 0, 0));
            float z = snoise(p + vec3(e, 0, 0)) - snoise(p - vec3(e, 0, 0)) - snoise(p + vec3(0, e, 0)) + snoise(p - vec3(0, e, 0));
            return normalize(vec3(x, y, z));
        }

        void main() {
            vec2 uv = gl_FragCoord.xy / resolution.xy;
            vec3 pos = texture2D(texturePosition, uv).xyz;
            vec3 vel = texture2D(textureVelocity, uv).xyz;

            vec3 force = vec3(0.0);
            float mode = uTargetParams.x;
            float scale = uTargetParams.y;
            float energy = uTargetParams.z;

            if (mode == 0.0 || mode == 1.0) { 
                float r = 10.0 * scale;
                vec3 target1 = vec3(0.0);
                vec3 target2 = vec3(0.0);
                
                if (mode == 1.0) {
                    target1 = vec3(-15.0, 0.0, 0.0);
                    target2 = vec3(15.0, 0.0, 0.0);
                }
                
                float a = uv.x * 6.28;
                float b = uv.y * 3.14;
                vec3 spherePoint = vec3(sin(b)*cos(a), sin(b)*sin(a), cos(b)) * r;
                
                vec3 primeTarget = (mode == 1.0 && uv.x > 0.5) ? target2 : target1;
                primeTarget += spherePoint;
                
                force += (primeTarget - pos) * 2.0;

                if (uIntent == 1) force += curlNoise(pos * 0.2 + uTime) * 15.0;
                else if (uIntent == 2) force += vec3(0.0, sin(pos.x * 0.5 + uTime) * 5.0, 0.0);
            } else if (mode == 2.0) {
                vec4 tData = texture2D(uTextTex, uv);
                if (tData.w > 0.5) force += (tData.xyz - pos) * 5.0;
                else {
                    force += curlNoise(pos * 0.05 + uTime) * (2.0 + uAudioData.z * 10.0);
                    force += -pos * 0.2;
                }
            }

            if (energy > 1.0) {
                vec3 expDir = normalize(pos) + curlNoise(pos * 0.1)*0.5;
                force += expDir * energy * 20.0;
            }

            if (uAudioData.x > 0.7) force += normalize(pos) * (uAudioData.x * 25.0);

            vec3 dir1 = uHand1 - pos; float d1 = length(dir1);
            if (d1 < 15.0) force += normalize(dir1) * (15.0 - d1) * uHandDist1 * 5.0;
            
            vec3 dir2 = uHand2 - pos; float d2 = length(dir2);
            if (d2 < 15.0) force += normalize(dir2) * (15.0 - d2) * uHandDist2 * 5.0;

            force += curlNoise(pos * 0.5 + uTime) * (1.0 + uAudioData.y * 3.0 + uAudioData.z * 5.0);

            vel += force * uDelta;
            vel *= 0.90;

            float maxSpeed = (uIntent == 1 || energy > 1.0) ? 50.0 : 25.0;
            if(length(vel) > maxSpeed) vel = normalize(vel) * maxSpeed;

            gl_FragColor = vec4(vel, 1.0);
        }
    </script>

    <script type="x-shader/x-vertex" id="render-vs">
        uniform sampler2D tPos;
        uniform sampler2D tVel;
        uniform vec3 uColorA;
        uniform vec3 uColorB;
        varying vec4 vColor;
        
        void main() {
            vec3 pos = texture2D(tPos, position.xy).xyz;
            vec3 vel = texture2D(tVel, position.xy).xyz;
            float speed = length(vel);
            
            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_PointSize = (4.0 + speed * 0.1) / -mvPosition.z;
            gl_Position = projectionMatrix * mvPosition;
            
            float mixVal = smoothstep(0.0, 20.0, speed) * 0.5 + (sin(pos.y * 0.1) * 0.5 + 0.5);
            vec3 color = mix(uColorA, uColorB, mixVal);
            vColor = vec4(color, 0.7 + speed * 0.01);
        }
    </script>
    <script type="x-shader/x-fragment" id="render-fs">
        varying vec4 vColor;
        void main() {
            vec2 cxy = 2.0 * gl_PointCoord - 1.0;
            float r = dot(cxy, cxy);
            if (r > 1.0) discard;
            float glow = exp(-r * 3.0);
            gl_FragColor = vec4(vColor.rgb * glow * 1.5, vColor.a * glow);
        }
    </script>

    <script type="x-shader/x-vertex" id="brain-vs">
        varying vec3 vNormal; varying vec3 vPos;
        void main() {
            vNormal = normalize(normalMatrix * normal);
            vPos = (modelViewMatrix * vec4(position, 1.0)).xyz;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    </script>
    <script type="x-shader/x-fragment" id="brain-fs">
        uniform vec3 color; uniform float intensity; varying vec3 vNormal; varying vec3 vPos;
        void main() {
            float rim = 1.0 - max(dot(viewMatrix[2].xyz, vNormal), 0.0);
            rim = smoothstep(0.5, 1.0, rim);
            gl_FragColor = vec4(color * rim * intensity * 2.0, rim * 0.8);
        }
    </script>

    <!-- Main ES Module Implementation -->
    <script type="module">
        import * as THREE from 'three';
        import { GPUComputationRenderer } from 'three/addons/misc/GPUComputationRenderer.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // Custom Shader Pass
        const NeuralDistortionShader = {
            uniforms: {
                "tDiffuse": { value: null },
                "uTime": { value: 0.0 },
                "uIntensity": { value: 0.0 },
                "uDistortion": { value: 0.0 }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform float uTime;
                uniform float uIntensity;
                uniform float uDistortion;
                varying vec2 vUv;
                void main() {
                    vec2 uv = vUv;
                    uv.y += sin(uv.x * 20.0 + uTime * 5.0) * uDistortion * 0.01;
                    uv.x += cos(uv.y * 20.0 + uTime * 5.0) * uDistortion * 0.01;
                    float caOffset = 0.002 * uIntensity;
                    float r = texture2D(tDiffuse, uv + vec2(caOffset, 0.0)).r;
                    float g = texture2D(tDiffuse, uv).g;
                    float b = texture2D(tDiffuse, uv - vec2(caOffset, 0.0)).b;
                    gl_FragColor = vec4(r, g, b, 1.0);
                }
            `
        };

        const FBO_WIDTH = 512;

        const INTENTS = {
            COMBAT: {
                keys: ['قتال', 'معركة', 'أحمر', 'دمر', 'هجوم', 'combat'], intentId: 1, theme: 'combat',
                cA: 0xff003c, cB: 0xff5500, reply: 'تفعيل وضع القتال... الدروع جاهزة'
            },
            ANALYSIS: {
                keys: ['تحليل', 'حلل', 'فحص', 'بيانات', 'نظام', 'analysis'], intentId: 2, theme: 'analysis',
                cA: 0x0088ff, cB: 0x00ffff, reply: 'بدء تحليل طاقة النواة وعرض استهلاك البيانات'
            },
            DATA: {
                keys: ['مصفوفة', 'خوارزمية', 'أخضر'], intentId: 3, theme: 'data',
                cA: 0x00ff66, cB: 0x0088ff, reply: 'دمج المصفوفات وتحديث الخوارزمية المركزية'
            },
            CALM: {
                keys: ['هدوء', 'سكون', 'إيقاف', 'طبيعي', 'أزرق', 'calm'], intentId: 0, theme: 'default',
                cA: 0x00ffff, cB: 0x8a2be2, reply: 'إعادة ضبط الأنظمة لوضع السكون المؤقت'
            },
            CINEMATIC: {
                keys: ['سينمائي', 'عرض', 'تفعيل العرض', 'cinema'], intentId: 0, theme: 'default', action: 'cinema',
                cA: 0x00ffff, cB: 0x8a2be2, reply: 'تفعيل الواجهة السينمائية الكاملة'
            },
            EXPLOSION: {
                keys: ['انفجار', 'انفجر', 'بوم', 'explode', 'boom'], intentId: 1, action: 'explode',
                cA: 0xffaa00, cB: 0xff0000, reply: 'تحذير... تفريغ طاقة قصوى'
            },
            YAHYA: {
                keys: ['يحيى', 'يحيي', 'سيدي', 'yahya'], intentId: 0, theme: 'yahya', action: 'easterEgg',
                cA: 0xffd700, cB: 0xff00ff, reply: 'أهلاً بك يا هندسة، الأنظمة كلها تحت إمرتك'
            }
        };

        class AICore {
            constructor() {
                this.initGraphics();
                this.initBrainCore();
                this.initGPGPU();
                this.initSpeech();
                this.initAudio();
                this.initUI();

                // Dynamically import MediaPipe via standard script tags to ensure compatibility 
                // since they expose globals instead of reliable ES modules.
                this.loadMediaPipe().then(() => {
                    this.initMediaPipe();
                    document.getElementById('loader').style.opacity = 0;
                    setTimeout(() => {
                        document.getElementById('loader').style.display = 'none';
                        document.getElementById('ui-layer').classList.remove('hidden');
                    }, 1000);
                });

                this.clock = new THREE.Clock();
                this.state = {
                    intent: 0, theme: 'default', mode: 0, scale: 1.0, energy: 0.0,
                    h1: new THREE.Vector3(), h2: new THREE.Vector3(),
                    hd1: 0, hd2: 0,
                    audioBass: 0, audioMid: 0, speechSync: 0
                };

                this.nlpTimeout = null;
                this.textCanvas = document.getElementById('text-canvas');
                this.textCtx = this.textCanvas.getContext('2d');
                this.textTexture = new THREE.DataTexture(new Float32Array(FBO_WIDTH * FBO_WIDTH * 4), FBO_WIDTH, FBO_WIDTH, THREE.RGBAFormat, THREE.FloatType);

                this.animate();
            }

            // Using ES module dynamic script loading for external non-ESM libs
            loadMediaPipe() {
                return new Promise((resolve) => {
                    const script1 = document.createElement('script');
                    script1.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js';
                    document.body.appendChild(script1);
                    script1.onload = () => {
                        const script2 = document.createElement('script');
                        script2.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js';
                        document.body.appendChild(script2);
                        script2.onload = resolve;
                    };
                });
            }

            initGraphics() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.z = 40;

                this.renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                document.body.appendChild(this.renderer.domElement);

                this.composer = new EffectComposer(this.renderer);
                this.renderPass = new RenderPass(this.scene, this.camera);
                this.composer.addPass(this.renderPass);

                this.bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.8, 0.4, 0.85);
                this.composer.addPass(this.bloomPass);

                this.neuralPass = new ShaderPass(NeuralDistortionShader);
                this.composer.addPass(this.neuralPass);

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                    this.composer.setSize(window.innerWidth, window.innerHeight);
                });
            }

            initBrainCore() {
                this.coreGrp = new THREE.Group();
                this.scene.add(this.coreGrp);

                const geo = new THREE.IcosahedronGeometry(6, 4);
                this.brainMat = new THREE.ShaderMaterial({
                    vertexShader: document.getElementById('brain-vs').textContent,
                    fragmentShader: document.getElementById('brain-fs').textContent,
                    uniforms: { color: { value: new THREE.Color(0x00ffff) }, intensity: { value: 1.0 } },
                    transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
                });
                const sphere = new THREE.Mesh(geo, this.brainMat);
                this.coreGrp.add(sphere);

                for (let i = 0; i < 3; i++) {
                    const rgeo = new THREE.RingGeometry(8 + i * 2, 8.2 + i * 2, 64);
                    const rmat = new THREE.MeshBasicMaterial({ color: 0x8a2be2, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
                    const ring = new THREE.Mesh(rgeo, rmat);
                    ring.rotation.x = Math.random() * Math.PI;
                    ring.rotation.y = Math.random() * Math.PI;
                    ring.userData = { rx: Math.random() * 0.02, ry: Math.random() * 0.02 };
                    this.coreGrp.add(ring);
                }
            }

            initGPGPU() {
                this.gpu = new GPUComputationRenderer(FBO_WIDTH, FBO_WIDTH, this.renderer);
                const dtPos = this.gpu.createTexture();
                const dtVel = this.gpu.createTexture();

                const pArr = dtPos.image.data;
                for (let i = 0; i < pArr.length; i += 4) {
                    pArr[i] = (Math.random() - 0.5) * 80;
                    pArr[i + 1] = (Math.random() - 0.5) * 80;
                    pArr[i + 2] = (Math.random() - 0.5) * 80;
                    pArr[i + 3] = 1.0;
                }

                this.posVar = this.gpu.addVariable("texturePosition", document.getElementById('compute-pos').textContent, dtPos);
                this.velVar = this.gpu.addVariable("textureVelocity", document.getElementById('compute-vel').textContent, dtVel);

                this.gpu.setVariableDependencies(this.posVar, [this.posVar, this.velVar]);
                this.gpu.setVariableDependencies(this.velVar, [this.posVar, this.velVar]);

                this.velUnif = this.velVar.material.uniforms;
                this.velUnif.uTime = { value: 0 }; this.velUnif.uDelta = { value: 0 };
                this.velUnif.uTargetParams = { value: new THREE.Vector3(0, 1, 0) };
                this.velUnif.uTextTex = { value: this.textTexture };
                this.velUnif.uAudioData = { value: new THREE.Vector3() };
                this.velUnif.uHand1 = { value: new THREE.Vector3() };
                this.velUnif.uHand2 = { value: new THREE.Vector3() };
                this.velUnif.uHandDist1 = { value: 0 };
                this.velUnif.uHandDist2 = { value: 0 };
                this.velUnif.uIntent = { value: 0 };

                this.posVar.material.uniforms.uDelta = { value: 0 };

                this.gpu.init();

                const geo = new THREE.BufferGeometry();
                const uvs = new Float32Array(FBO_WIDTH * FBO_WIDTH * 2);
                let p = 0;
                for (let i = 0; i < FBO_WIDTH; i++) {
                    for (let j = 0; j < FBO_WIDTH; j++) {
                        uvs[p++] = (i + 0.5) / FBO_WIDTH;
                        uvs[p++] = (j + 0.5) / FBO_WIDTH;
                    }
                }
                geo.setAttribute('position', new THREE.BufferAttribute(uvs, 2));

                this.pMat = new THREE.ShaderMaterial({
                    vertexShader: document.getElementById('render-vs').textContent,
                    fragmentShader: document.getElementById('render-fs').textContent,
                    uniforms: {
                        tPos: { value: null }, tVel: { value: null },
                        uColorA: { value: new THREE.Color(INTENTS.CALM.cA) },
                        uColorB: { value: new THREE.Color(INTENTS.CALM.cB) }
                    },
                    transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
                });

                this.points = new THREE.Points(geo, this.pMat);
                this.scene.add(this.points);
            }

            initSpeech() {
                window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!window.SpeechRecognition) return;

                this.recog = new window.SpeechRecognition();
                this.recog.lang = 'ar-EG';
                this.recog.continuous = true;
                this.recog.interimResults = true;

                this.synth = window.speechSynthesis;

                this.recog.onresult = (e) => {
                    let text = '';
                    for (let i = e.resultIndex; i < e.results.length; ++i) text += e.results[i][0].transcript;

                    document.getElementById('ai-speech-text').innerText = text;
                    this.state.speechSync = 1.0;

                    if (e.results[e.results.length - 1].isFinal) {
                        this.parseIntent(text);
                        this.renderTextToParticles(text);
                    }
                };

                this.recog.onend = () => { if (this.audioActive) this.recog.start(); };
            }

            parseIntent(text) {
                let foundIntent = null;
                for (const key in INTENTS) {
                    if (INTENTS[key].keys.some(k => text.includes(k))) {
                        foundIntent = INTENTS[key];
                        break;
                    }
                }

                if (foundIntent) {
                    document.getElementById('ai-intent').innerText = `INTENT: [${foundIntent.theme.toUpperCase()}] | ENGAGING: TRUE`;
                    this.state.intent = foundIntent.intentId || 0;

                    document.body.className = `theme-${foundIntent.theme}`;
                    this.pMat.uniforms.uColorA.value.setHex(foundIntent.cA);
                    this.pMat.uniforms.uColorB.value.setHex(foundIntent.cB);
                    this.brainMat.uniforms.color.value.setHex(foundIntent.cA);

                    if (foundIntent.reply) {
                        this.speak(foundIntent.reply);
                    }

                    if (foundIntent.action === 'cinema') {
                        document.getElementById('ui-layer').classList.add('hidden');
                        document.getElementById('cinematic-title').style.opacity = 1;
                        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
                    }
                    if (foundIntent.action === 'explode') {
                        this.state.energy = 5.0;
                        this.bloomPass.strength = 3.0;
                    }
                    if (foundIntent.action === 'easterEgg') {
                        this.bloomPass.strength = 4.0;
                    }
                }
            }

            speak(txt) {
                if (this.synth.speaking) this.synth.cancel();
                const u = new SpeechSynthesisUtterance(txt);
                u.lang = 'ar-SA';
                u.rate = 1.1; u.pitch = 0.8;
                this.synth.speak(u);
            }

            renderTextToParticles(text) {
                this.state.mode = 2;
                this.textCtx.fillStyle = 'black'; this.textCtx.fillRect(0, 0, 1024, 1024);
                this.textCtx.fillStyle = 'white'; this.textCtx.font = 'bold 120px Tajawal';
                this.textCtx.textAlign = 'center'; this.textCtx.textBaseline = 'middle';

                let lines = [];
                if (text.length > 20) {
                    lines.push(text.substring(0, text.length / 2));
                    lines.push(text.substring(text.length / 2));
                } else lines.push(text);

                lines.forEach((l, i) => this.textCtx.fillText(l, 512, 450 + (i * 140)));

                const imgData = this.textCtx.getImageData(0, 0, 1024, 1024).data;
                const texData = this.textTexture.image.data;

                let validPixels = [];
                for (let i = 0; i < imgData.length; i += 4) {
                    if (imgData[i] > 100) validPixels.push({ x: (i / 4) % 1024, y: Math.floor((i / 4) / 1024) });
                }

                if (validPixels.length > 0) {
                    for (let i = 0; i < texData.length; i += 4) {
                        let rp = validPixels[Math.floor(Math.random() * validPixels.length)];
                        texData[i] = (rp.x - 512) * 0.06;
                        texData[i + 1] = -(rp.y - 512) * 0.06;
                        texData[i + 2] = (Math.random() - 0.5) * 3.0;
                        texData[i + 3] = 1.0;
                    }
                }
                this.textTexture.needsUpdate = true;

                clearTimeout(this.nlpTimeout);
                this.nlpTimeout = setTimeout(() => { this.state.mode = 0; }, 4000);
            }

            initAudio() {
                this.audioActive = false;
                document.getElementById('btn-mic').onclick = async () => {
                    if (!this.audioCtx) {
                        try {
                            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                            this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                            this.analyser = this.audioCtx.createAnalyser();
                            this.analyser.fftSize = 256;
                            this.audioCtx.createMediaStreamSource(stream).connect(this.analyser);
                            this.freqData = new Uint8Array(this.analyser.frequencyBinCount);
                            this.audioActive = true;
                            if (this.recog) this.recog.start();
                            document.getElementById('btn-mic').classList.add('active');
                            document.getElementById('audio-val').innerText = 'ON CORE';
                            this.speak('تم ربط الشبكة العصبية بنجاح');
                        } catch (e) { alert("Mic required for AI sync"); }
                    } else {
                        if (this.audioActive) {
                            this.audioCtx.suspend(); this.audioActive = false;
                            if (this.recog) this.recog.stop();
                            document.getElementById('btn-mic').classList.remove('active');
                            document.getElementById('audio-val').innerText = 'OFF';
                        } else {
                            this.audioCtx.resume(); this.audioActive = true;
                            if (this.recog) this.recog.start();
                            document.getElementById('btn-mic').classList.add('active');
                            document.getElementById('audio-val').innerText = 'ON CORE';
                        }
                    }
                };
            }

            initMediaPipe() {
                if (!window.Hands || !window.Camera) return;
                const video = document.getElementById('video');
                const hands = new window.Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
                hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6 });
                hands.onResults((res) => {
                    this.state.hd1 = 0; this.state.hd2 = 0;

                    if (res.multiHandLandmarks?.length > 0) {
                        let lm1 = res.multiHandLandmarks[0];
                        this.state.h1.set((lm1[9].x - 0.5) * 60, -(lm1[9].y - 0.5) * 60, 0);

                        let open1 = 0; for (let tip of [8, 12, 16, 20]) if (lm1[tip].y < lm1[tip - 2].y) open1++;
                        if (open1 === 0) { this.state.hd1 = -5.0; this.state.energy = 2.0; }
                        else { this.state.hd1 = 2.0; this.state.energy = 0.0; }

                        let dx = lm1[4].x - lm1[8].x, dy = lm1[4].y - lm1[8].y;
                        this.state.scale = Math.max(0.5, 1.0 + (0.1 - Math.sqrt(dx * dx + dy * dy)) * 5.0);

                        if (res.multiHandLandmarks.length > 1) {
                            this.state.mode = 1;
                            let lm2 = res.multiHandLandmarks[1];
                            this.state.h2.set((lm2[9].x - 0.5) * 60, -(lm2[9].y - 0.5) * 60, 0);
                            let open2 = 0; for (let tip of [8, 12, 16, 20]) if (lm2[tip].y < lm2[tip - 2].y) open2++;
                            this.state.hd2 = (open2 === 0) ? -5.0 : 2.0;
                        } else {
                            if (this.state.mode === 1) this.state.mode = 0;
                        }
                    } else {
                        this.state.scale += (1.0 - this.state.scale) * 0.1;
                    }
                });

                try { new window.Camera(video, { onFrame: async () => await hands.send({ image: video }), width: 640, height: 480 }).start(); } catch (e) { }
            }

            initUI() {
                document.getElementById('btn-screenshot').onclick = () => {
                    this.renderer.render(this.scene, this.camera);
                    const link = document.createElement('a');
                    link.download = 'VisualBrain.png'; link.href = this.renderer.domElement.toDataURL(); link.click();
                };

                let recorder, chunks = [];
                document.getElementById('btn-record').onclick = (e) => {
                    if (recorder && recorder.state === 'recording') return;
                    const stream = this.renderer.domElement.captureStream(60);
                    recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                    recorder.ondataavailable = ev => chunks.push(ev.data);
                    recorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'video/webm' }); chunks = [];
                        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'VisualBrain.webm'; a.click();
                        e.target.innerText = '🔴 تسجيل 30 ثانية'; e.target.style.color = '';
                    };
                    recorder.start();
                    e.target.innerText = '...RECORDING...'; e.target.style.color = 'var(--danger)';
                    setTimeout(() => recorder.stop(), 30000);
                };
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                const dt = Math.min(this.clock.getDelta(), 0.1);
                const time = this.clock.getElapsedTime();

                if (this.audioActive && this.analyser) {
                    this.analyser.getByteFrequencyData(this.freqData);
                    let b = 0, m = 0;
                    for (let i = 0; i < 5; i++) b += this.freqData[i];
                    for (let i = 20; i < 40; i++) m += this.freqData[i];
                    this.state.audioBass += ((b / 5 / 255) - this.state.audioBass) * 0.2;
                    this.state.audioMid += ((m / 20 / 255) - this.state.audioMid) * 0.2;

                    this.brainMat.uniforms.intensity.value = 1.0 + this.state.audioBass * 2.0;
                    const scaleC = 1.0 + this.state.audioBass * 0.5;
                    this.coreGrp.children[0].scale.set(scaleC, scaleC, scaleC);
                }

                this.state.speechSync *= 0.95;
                this.state.energy *= 0.95;
                this.bloomPass.strength += (1.8 - this.bloomPass.strength) * 0.05;

                this.neuralPass.uniforms.uTime.value = time;
                this.neuralPass.uniforms.uIntensity.value = 1.0 + this.state.speechSync * 5.0 + this.state.energy;
                this.neuralPass.uniforms.uDistortion.value = this.state.speechSync;

                for (let i = 1; i <= 3; i++) {
                    let r = this.coreGrp.children[i];
                    let speedM = (this.state.intent === 2) ? 5.0 : 1.0;
                    r.rotation.x += r.userData.rx * speedM;
                    r.rotation.y += r.userData.ry * speedM;
                }

                this.velUnif.uTime.value = time;
                this.velUnif.uDelta.value = dt;
                this.velUnif.uTargetParams.value.set(this.state.mode, this.state.scale, this.state.energy);
                this.velUnif.uAudioData.value.set(this.state.audioBass, this.state.audioMid, this.state.speechSync);
                this.velUnif.uHand1.value.copy(this.state.h1);
                this.velUnif.uHand2.value.copy(this.state.h2);
                this.velUnif.uHandDist1.value = this.state.hd1;
                this.velUnif.uHandDist2.value = this.state.hd2;
                this.velUnif.uIntent.value = this.state.intent;

                this.posVar.material.uniforms.uDelta.value = dt;

                this.gpu.compute();
                this.pMat.uniforms.tPos.value = this.gpu.getCurrentRenderTarget(this.posVar).texture;
                this.pMat.uniforms.tVel.value = this.gpu.getCurrentRenderTarget(this.velVar).texture;

                if (document.getElementById('ui-layer').classList.contains('hidden')) {
                    this.camera.position.x = Math.sin(time * 0.1) * 15;
                    this.camera.position.z = Math.cos(time * 0.1) * 30 + 10;
                    this.camera.lookAt(0, 0, 0);
                } else {
                    this.camera.position.x += (Math.sin(time * 0.5) * 2.0 - this.camera.position.x) * 0.05;
                    this.camera.position.z += (40 - this.camera.position.z) * 0.05;
                    this.camera.lookAt(0, 0, 0);
                }

                this.composer.render();

                if (Math.random() > 0.9) {
                    document.getElementById('fps-val').innerText = Math.round(1 / dt);
                    let mStr = ['CALM', 'SPLIT LINK', 'NEURAL TEXT'][this.state.mode];
                    document.getElementById('mode-val').innerText = mStr;
                }
            }
        }

        window.onload = () => new AICore();
    </script>
</body>
