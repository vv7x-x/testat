<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPGPU Cinematic Particle Engine | TouchDesigner Quality</title>
    <style>
        :root {
            --primary: #8a2be2;
            --secondary: #00ffff;
            --bg-dark: #020205;
            --text-main: #ffffff;
            --font-main: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: var(--font-main);
            color: var(--text-main);
            user-select: none;
            -webkit-user-select: none;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        video {
            display: none;
        }

        /* Cinematic UI Layer */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            box-sizing: border-box;
            transition: opacity 1s ease;
        }

        .hud-panel {
            background: rgba(2, 2, 5, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 24px;
            pointer-events: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
        }

        .header-title {
            pointer-events: auto;
        }

        h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.9);
        }

        h1 span {
            font-weight: 700;
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary);
            transition: color 1s;
        }

        .subtitle {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-top: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .stat-value {
            font-family: 'JetBrains Mono', 'Courier New', Courier, monospace;
            font-size: 1rem;
            color: var(--secondary);
            text-shadow: 0 0 10px var(--secondary);
            transition: color 1s;
        }

        .stat-label {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
        }

        .controls-info {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            pointer-events: auto;
            max-width: 320px;
            line-height: 1.8;
            letter-spacing: 1px;
        }

        .controls-info strong {
            color: #fff;
            margin-bottom: 12px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.7rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
        }

        .controls-info ul {
            margin: 0;
            padding-left: 20px;
            list-style-type: square;
        }

        .controls-info li::marker {
            color: var(--primary);
            transition: color 1s;
        }

        .action-buttons {
            display: flex;
            gap: 16px;
            pointer-events: auto;
        }

        button {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            padding: 12px 28px;
            border-radius: 6px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            backdrop-filter: blur(10px);
        }

        button:hover,
        button.active {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--secondary);
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        #loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border-top-color: var(--secondary);
            border-right-color: var(--primary);
            animation: spin 2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin-bottom: 30px;
        }

        .loader-text {
            font-size: 0.7rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            animation: pulse 2s infinite;
        }

        #overlay-status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: 100;
            letter-spacing: 20px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 40px var(--secondary);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 5;
            text-align: center;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }
        }

        #speech-text {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 0 20px var(--secondary), 0 0 40px var(--primary);
            pointer-events: none;
            z-index: 20;
            text-align: center;
            max-width: 80%;
            opacity: 0;
            transition: opacity 0.5s;
            letter-spacing: 2px;
            direction: rtl;
            /* Arabic support */
        }

        .hidden {
            opacity: 0 !important;
            pointer-events: none !important;
        }
    </style>
</head>

    <!-- GPGPU Shaders -->
    <script type="x-shader/x-fragment" id="compute-position">
        uniform float uTime;
        uniform float uDelta;
        void main() {
            vec2 uv = gl_FragCoord.xy / resolution.xy;
            vec4 tmpPos = texture2D(texturePosition, uv);
            vec3 pos = tmpPos.xyz;
            vec4 tmpVel = texture2D(textureVelocity, uv);
            vec3 vel = tmpVel.xyz;
            float life = tmpPos.w;

            // Apply velocity
            pos += vel * uDelta * 50.0;
            
            // Re-spawn logic
            life -= uDelta * (0.1 + uv.x * 0.2);
            if (life <= 0.0) {
                // Respawn at origin or specific bounds based on shape later, but GPGPU velocity handles the journey
                // Actually, best to just let it loop smoothly or respawn near center
                pos = vec3(uv.x * 0.01, uv.y * 0.01, 0.0);
                life = 1.0;
            }

            gl_FragColor = vec4(pos, life);
        }
    </script>

    <script type="x-shader/x-fragment" id="compute-velocity">
        uniform float uTime;
        uniform float uDelta;
        uniform int uShape;
        uniform vec3 uAudioData; // x: bass, y: mid, z: high
        uniform vec3 uHandPos;
        uniform float uHandForce; // Positive for attract, negative for explosion
        uniform float uPinchScale;
        uniform float uVortex;
        
        // Simplex 3D Noise function (Ashima Arts)
        vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
        vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
        float snoise(vec3 v) {
            const vec2  C = vec2(1.0/6.0, 1.0/3.0); const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
            vec3 i  = floor(v + dot(v, C.yyy)); vec3 x0 = v - i + dot(i, C.xxx);
            vec3 g = step(x0.yzx, x0.xyz); vec3 l = 1.0 - g;
            vec3 i1 = min(g.xyz, l.zxy); vec3 i2 = max(g.xyz, l.zxy);
            vec3 x1 = x0 - i1 + C.xxx; vec3 x2 = x0 - i2 + C.yyy; vec3 x3 = x0 - D.yyy;
            i = mod289(i);
            vec4 p = permute(permute(permute(i.z + vec4(0.0, i1.z, i2.z, 1.0)) + i.y + vec4(0.0, i1.y, i2.y, 1.0)) + i.x + vec4(0.0, i1.x, i2.x, 1.0));
            float n_ = 0.142857142857; vec3  ns = n_ * D.wyz - D.xzx;
            vec4 j = p - 49.0 * floor(p * ns.z * ns.z); vec4 x_ = floor(j * ns.z); vec4 y_ = floor(j - 7.0 * x_);
            vec4 x = x_ *ns.x + ns.yyyy; vec4 y = y_ *ns.x + ns.yyyy; vec4 h = 1.0 - abs(x) - abs(y);
            vec4 b0 = vec4(x.xy, y.xy); vec4 b1 = vec4(x.zw, y.zw);
            vec4 s0 = floor(b0)*2.0 + 1.0; vec4 s1 = floor(b1)*2.0 + 1.0; vec4 sh = -step(h, vec4(0.0));
            vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy; vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
            vec3 p0 = vec3(a0.xy,h.x); vec3 p1 = vec3(a0.zw,h.y); vec3 p2 = vec3(a1.xy,h.z); vec3 p3 = vec3(a1.zw,h.w);
            vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
            p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
            vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
            m = m * m; return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
        }
        vec3 curlNoise(vec3 p) {
            float e = 0.1;
            vec3 dx = vec3(e, 0.0, 0.0); vec3 dy = vec3(0.0, e, 0.0); vec3 dz = vec3(0.0, 0.0, e);
            vec3 p_x0 = vec3(snoise(p - dx), snoise(p - dx + vec3(12.3, 45.6, 78.9)), snoise(p - dx + vec3(98.7, 65.4, 32.1)));
            vec3 p_x1 = vec3(snoise(p + dx), snoise(p + dx + vec3(12.3, 45.6, 78.9)), snoise(p + dx + vec3(98.7, 65.4, 32.1)));
            vec3 p_y0 = vec3(snoise(p - dy), snoise(p - dy + vec3(12.3, 45.6, 78.9)), snoise(p - dy + vec3(98.7, 65.4, 32.1)));
            vec3 p_y1 = vec3(snoise(p + dy), snoise(p + dy + vec3(12.3, 45.6, 78.9)), snoise(p + dy + vec3(98.7, 65.4, 32.1)));
            vec3 p_z0 = vec3(snoise(p - dz), snoise(p - dz + vec3(12.3, 45.6, 78.9)), snoise(p - dz + vec3(98.7, 65.4, 32.1)));
            vec3 p_z1 = vec3(snoise(p + dz), snoise(p + dz + vec3(12.3, 45.6, 78.9)), snoise(p + dz + vec3(98.7, 65.4, 32.1)));
            float x = p_y1.z - p_y0.z - p_z1.y + p_z0.y;
            float y = p_z1.x - p_z0.x - p_x1.z + p_x0.z;
            float z = p_x1.y - p_x0.y - p_y1.x + p_y0.x;
            const float divisor = 1.0 / (2.0 * e);
            return normalize(vec3(x , y , z) * divisor);
        }

        vec3 getTargetPos(vec2 uv, float id, float time) {
            vec3 target = vec3(0.0);
            float u = uv.x * 2.0 * 3.14159;
            float v = uv.y * 3.14159;
            
            if (uShape == 0) { // Sphere
                float r = 10.0;
                target.x = r * sin(v) * cos(u);
                target.y = r * sin(v) * sin(u);
                target.z = r * cos(v);
            } else if (uShape == 1) { // Torus
                float R = 8.0; float r = 3.0;
                target.x = (R + r * cos(v)) * cos(u);
                target.y = (R + r * cos(v)) * sin(u);
                target.z = r * sin(v);
            } else if (uShape == 2) { // Galaxy Spiral
                float spiralT = uv.x * 10.0;
                float angle = spiralT * 3.14159 + (uv.y > 0.5 ? 3.14159 : 0.0);
                float radius = spiralT * 2.0;
                target.x = cos(angle) * radius;
                target.z = sin(angle) * radius;
                target.y = (uv.y - 0.5) * (15.0 - radius); // bulge
            } else if (uShape == 3) { // Neural Web (Organic Noise bounds)
                target = vec3(cos(u)*8.0, sin(v)*8.0, sin(u)*8.0) + curlNoise(vec3(u, v, time*0.1))*5.0;
            }
            return target * uPinchScale * (1.0 + uAudioData.x * 0.2);
        }

        void main() {
            vec2 uv = gl_FragCoord.xy / resolution.xy;
            float id = uv.x + uv.y * resolution.x;
            vec4 tmpPos = texture2D(texturePosition, uv);
            vec3 pos = tmpPos.xyz;
            vec4 tmpVel = texture2D(textureVelocity, uv);
            vec3 vel = tmpVel.xyz;

            vec3 target = getTargetPos(uv, id, uTime);
            
            // Forces
            vec3 dir = target - pos;
            float dist = length(dir);
            vec3 force = normalize(dir) * min(dist, 10.0) * 0.1; // Attraction to shape

            // Curl Noise Turbulence (highly active with mid freq)
            vec3 turbulence = curlNoise(pos * 0.1 + uTime * 0.2) * (1.0 + uAudioData.y * 3.0);
            
            // Hand Physics (Gravitational/Repulsion)
            vec3 handDir = uHandPos - pos;
            float handDist = length(handDir);
            if(handDist < 15.0) {
                float hForce = (1.0 - (handDist/15.0)) * uHandForce;
                force += normalize(handDir) * hForce * 5.0;
            }

            // Vortex motion
            if (uVortex > 0.0) {
                vec3 vDir = normalize(vec3(-pos.z, 0.0, pos.x)); // tangential
                force += vDir * uVortex * 2.0;
            }

            // Explosion Override
            if (uHandForce < -5.0) {
                vec3 expDir = normalize(pos) + turbulence * 0.5;
                force += expDir * abs(uHandForce);
            }

            // Integration
            vel += force * uDelta;
            vel += turbulence * uDelta * 2.0;
            vel *= 0.95; // Friction

            // Max velocity cap
            float speed = length(vel);
            if(speed > 10.0) vel = normalize(vel) * 10.0;

            gl_FragColor = vec4(vel, 1.0);
        }
    </script>

    <!-- Render Shaders -->
    <script type="x-shader/x-vertex" id="render-vs">
        uniform sampler2D texturePosition;
        uniform sampler2D textureVelocity;
        uniform vec3 uColor1;
        uniform vec3 uColor2;
        uniform float uHueShift;
        uniform float uAudioHigh;
        
        varying vec4 vColor;
        varying float vAlpha;

        vec3 hueShift(vec3 color, float hue) {
            const vec3 k = vec3(0.57735, 0.57735, 0.57735);
            float cosAngle = cos(hue);
            return vec3(color * cosAngle + cross(k, color) * sin(hue) + k * dot(k, color) * (1.0 - cosAngle));
        }

        void main() {
            vec4 posData = texture2D(texturePosition, position.xy);
            vec3 pos = posData.xyz;
            float life = posData.w;

            vec4 velData = texture2D(textureVelocity, position.xy);
            float speed = length(velData.xyz);

            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_PointSize = (15.0 + uAudioHigh * 20.0) / -mvPosition.z;
            gl_Position = projectionMatrix * mvPosition;

            // Coloring based on speed and UV
            float mixVal = smoothstep(0.0, 5.0, speed);
            vec3 baseColor = mix(uColor1, uColor2, mixVal + position.x);
            baseColor = hueShift(baseColor, uHueShift * 6.28);
            
            // Life fade
            vAlpha = smoothstep(0.0, 0.2, life) * smoothstep(1.0, 0.8, life) * 0.8;
            vColor = vec4(baseColor, 1.0);
        }
    </script>
    <script type="x-shader/x-fragment" id="render-fs">
        varying vec4 vColor;
        varying float vAlpha;
        void main() {
            vec2 cxy = 2.0 * gl_PointCoord - 1.0;
            float r = dot(cxy, cxy);
            if (r > 1.0) discard;
            float core = exp(-r * 3.0);
            gl_FragColor = vec4(vColor.rgb * core * 1.5, vAlpha * core);
        }
    </script>

    <script>
        /**
         * AAA GPGPU Particle Core
         * Architecture: TouchDesigner / Unreal Engine Quality
         */

        const FBO_WIDTH = 512; // 512x512 = 262,144 particles
        const CONFIG = {
            themes: [
                { name: 'COSMIC', c1: 0x8a2be2, c2: 0x00ffff, root1: '#8a2be2', root2: '#00ffff' },
                { name: 'PLASMA FIRE', c1: 0xff3300, c2: 0xffaa00, root1: '#ff3300', root2: '#ffaa00' },
                { name: 'ICE MATTER', c1: 0xccffff, c2: 0x0044ff, root1: '#0044ff', root2: '#ccffff' },
                { name: 'CYBER NEON', c1: 0xff007f, c2: 0x00ff00, root1: '#ff007f', root2: '#00ff00' }
            ],
            shapes: ['SPHERE', 'TORUS', 'GALAXY', 'NEURAL']
        };

        class RenderingEngine {
            constructor() {
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.FogExp2(0x020205, 0.015);
                this.camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.z = 35;

                this.renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); // Balance quality/perf
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.2;
                document.body.appendChild(this.renderer.domElement);

                this.composer = new THREE.EffectComposer(this.renderer);
                this.composer.addPass(new THREE.RenderPass(this.scene, this.camera));

                this.bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.0, 0.5, 0.8);
                this.composer.addPass(this.bloomPass);

                const vigPass = new THREE.ShaderPass(THREE.VignetteShader);
                vigPass.uniforms["offset"].value = 1.2;
                vigPass.uniforms["darkness"].value = 1.5;
                this.composer.addPass(vigPass);

                const filmPass = new THREE.ShaderPass(THREE.FilmShader);
                filmPass.uniforms["nIntensity"].value = 0.3; // noise
                filmPass.uniforms["sIntensity"].value = 0;   // scanlines
                this.composer.addPass(filmPass);

                window.addEventListener('resize', this.onResize.bind(this));

                // Starfield background
                this.createStars();
            }

            createStars() {
                const geo = new THREE.BufferGeometry();
                const pos = new Float32Array(2000 * 3);
                for (let i = 0; i < 6000; i++) {
                    pos[i] = (Math.random() - 0.5) * 200;
                }
                geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                const mat = new THREE.PointsMaterial({ color: 0x444455, size: 0.1, transparent: true, opacity: 0.4 });
                this.stars = new THREE.Points(geo, mat);
                this.scene.add(this.stars);
            }

            onResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.composer.setSize(window.innerWidth, window.innerHeight);
            }
        }

        class GPUParticleSystem {
            constructor(engine) {
                this.engine = engine;
                this.gpuCompute = new GPUComputationRenderer(FBO_WIDTH, FBO_WIDTH, engine.renderer);

                const dtPosition = this.gpuCompute.createTexture();
                const dtVelocity = this.gpuCompute.createTexture();
                this.fillTextures(dtPosition, dtVelocity);

                this.posVar = this.gpuCompute.addVariable("texturePosition", document.getElementById('compute-position').textContent, dtPosition);
                this.velVar = this.gpuCompute.addVariable("textureVelocity", document.getElementById('compute-velocity').textContent, dtVelocity);

                this.gpuCompute.setVariableDependencies(this.posVar, [this.posVar, this.velVar]);
                this.gpuCompute.setVariableDependencies(this.velVar, [this.posVar, this.velVar]);

                this.posUniforms = this.posVar.material.uniforms;
                this.posUniforms.uTime = { value: 0 };
                this.posUniforms.uDelta = { value: 0 };

                this.velUniforms = this.velVar.material.uniforms;
                this.velUniforms.uTime = { value: 0 };
                this.velUniforms.uDelta = { value: 0 };
                this.velUniforms.uShape = { value: 0 };
                this.velUniforms.uAudioData = { value: new THREE.Vector3() };
                this.velUniforms.uHandPos = { value: new THREE.Vector3(0, 0, 0) };
                this.velUniforms.uHandForce = { value: 0 };
                this.velUniforms.uPinchScale = { value: 1.0 };
                this.velUniforms.uVortex = { value: 0.0 };

                const error = this.gpuCompute.init();
                if (error !== null) console.error(error);

                this.initRenderMaterial();
            }

            fillTextures(posTex, velTex) {
                const posArr = posTex.image.data;
                const velArr = velTex.image.data;
                for (let i = 0; i < posArr.length; i += 4) {
                    posArr[i] = (Math.random() - 0.5) * 50;
                    posArr[i + 1] = (Math.random() - 0.5) * 50;
                    posArr[i + 2] = (Math.random() - 0.5) * 50;
                    posArr[i + 3] = Math.random(); // life

                    velArr[i] = velArr[i + 1] = velArr[i + 2] = velArr[i + 3] = 0;
                }
            }

            initRenderMaterial() {
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(FBO_WIDTH * FBO_WIDTH * 3);
                let p = 0;
                for (let i = 0; i < FBO_WIDTH; i++) {
                    for (let j = 0; j < FBO_WIDTH; j++) {
                        positions[p++] = (i + 0.5) / FBO_WIDTH;
                        positions[p++] = (j + 0.5) / FBO_WIDTH;
                        positions[p++] = 0;
                    }
                }
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

                this.material = new THREE.ShaderMaterial({
                    vertexShader: document.getElementById('render-vs').textContent,
                    fragmentShader: document.getElementById('render-fs').textContent,
                    uniforms: {
                        texturePosition: { value: null },
                        textureVelocity: { value: null },
                        uColor1: { value: new THREE.Color(CONFIG.themes[0].c1) },
                        uColor2: { value: new THREE.Color(CONFIG.themes[0].c2) },
                        uHueShift: { value: 0 },
                        uAudioHigh: { value: 0 }
                    },
                    transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
                });

                this.mesh = new THREE.Points(geometry, this.material);
                this.engine.scene.add(this.mesh);
            }

            update(dt, time) {
                this.posUniforms.uTime.value = time;
                this.posUniforms.uDelta.value = dt;
                this.velUniforms.uTime.value = time;
                this.velUniforms.uDelta.value = dt;

                this.gpuCompute.compute();

                this.material.uniforms.texturePosition.value = this.gpuCompute.getCurrentRenderTarget(this.posVar).texture;
                this.material.uniforms.textureVelocity.value = this.gpuCompute.getCurrentRenderTarget(this.velVar).texture;
            }
        }

        class AudioEngine {
            constructor() {
                this.active = false;
                this.data = new THREE.Vector3(); // bass, mid, high
                this.initSpeech();
            }

            initSpeech() {
                window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (window.SpeechRecognition) {
                    this.recognition = new window.SpeechRecognition();
                    this.recognition.continuous = true;
                    this.recognition.interimResults = true;
                    this.recognition.lang = 'ar-SA'; // Arabic

                    this.recognition.onresult = (event) => {
                        let text = '';
                        for (let i = event.resultIndex; i < event.results.length; ++i) {
                            text += event.results[i][0].transcript;
                        }
                        const speechEl = document.getElementById('speech-text');
                        speechEl.innerText = text;
                        speechEl.style.opacity = 1;
                        clearTimeout(this.speechTimeout);
                        this.speechTimeout = setTimeout(() => { speechEl.style.opacity = 0; }, 4000);
                    };

                    this.recognition.onend = () => {
                        if (this.active) {
                            try { this.recognition.start(); } catch (e) { }
                        }
                    };
                }
            }

            async toggle() {
                if (this.active) {
                    this.active = false;
                    if (this.ctx) this.ctx.suspend();
                    if (this.recognition) this.recognition.stop();
                    document.getElementById('btn-audio').classList.remove('active');
                } else {
                    if (!this.ctx) {
                        try {
                            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                            this.analyser = this.ctx.createAnalyser();
                            this.analyser.fftSize = 256;
                            this.ctx.createMediaStreamSource(stream).connect(this.analyser);
                            this.freqData = new Uint8Array(this.analyser.frequencyBinCount);
                        } catch (e) { alert("Mic required for Acoustic Link"); return; }
                    }
                    this.ctx.resume();
                    this.active = true;
                    if (this.recognition) {
                        try { this.recognition.start(); } catch (e) { }
                    }
                    document.getElementById('btn-audio').classList.add('active');
                }
            }

            update() {
                if (!this.active) {
                    this.data.set(0, 0, 0); return;
                }
                this.analyser.getByteFrequencyData(this.freqData);
                let b = 0, m = 0, h = 0;
                for (let i = 0; i < 5; i++) b += this.freqData[i];
                for (let i = 20; i < 40; i++) m += this.freqData[i];
                for (let i = 80; i < 120; i++) h += this.freqData[i];
                // Smooth interpolation to avoid judder
                this.data.x += ((b / 5) / 255.0 - this.data.x) * 0.2;
                this.data.y += ((m / 20) / 255.0 - this.data.y) * 0.2;
                this.data.z += ((h / 40) / 255.0 - this.data.z) * 0.2;
            }
        }

        class AppController {
            constructor() {
                this.engine = new RenderingEngine();
                this.sys = new GPUParticleSystem(this.engine);
                this.audio = new AudioEngine();
                this.clock = new THREE.Clock();

                this.state = {
                    mode: 'AUTO', theme: 0, shape: 0,
                    targetPinch: 1.0, pinch: 1.0,
                    targetForce: 0, force: 0,
                    targetHue: 0, hue: 0,
                    targetVortex: 0, vortex: 0,
                    handX: 0, handY: 0,
                    autoTimer: 0
                };

                this.frameCount = 0; this.lastFpsTime = 0;

                this.initDOM();
                this.initMediaPipe();
                this.loop();
            }

            initDOM() {
                document.getElementById('btn-audio').onclick = () => this.audio.toggle();
                document.getElementById('btn-theme').onclick = () => this.cycleTheme();
            }

            showStatus(msg) {
                const el = document.getElementById('overlay-status');
                el.innerText = msg; el.style.opacity = 1;
                clearTimeout(this.statusTime);
                this.statusTime = setTimeout(() => el.style.opacity = 0, 1000);
            }

            cycleTheme() {
                this.state.theme = (this.state.theme + 1) % CONFIG.themes.length;
                const t = CONFIG.themes[this.state.theme];
                this.sys.material.uniforms.uColor1.value.setHex(t.c1);
                this.sys.material.uniforms.uColor2.value.setHex(t.c2);
                document.documentElement.style.setProperty('--primary', t.root1);
                document.documentElement.style.setProperty('--secondary', t.root2);
                document.getElementById('theme-status').innerText = t.name;
                this.showStatus(t.name);
            }

            switchShape(dir) {
                this.state.shape = (this.state.shape + dir + CONFIG.shapes.length) % CONFIG.shapes.length;
                this.sys.velUniforms.uShape.value = this.state.shape;
                this.showStatus(CONFIG.shapes[this.state.shape]);
            }

            async initMediaPipe() {
                const video = document.getElementById('video');
                const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
                hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
                hands.onResults(this.onHand.bind(this));

                try {
                    const cam = new Camera(video, { onFrame: async () => await hands.send({ image: video }), width: 640, height: 480 });
                    await cam.start();
                    this.onLoadComplete();
                } catch (e) {
                    document.getElementById('loader-status').innerText = "CAMERA DENIED - AI MODE ONLY";
                    setTimeout(() => this.onLoadComplete(), 2000);
                }
            }

            onLoadComplete() {
                document.getElementById('loader').style.opacity = 0;
                setTimeout(() => document.getElementById('loader').style.display = 'none', 1500);
                document.getElementById('ui-layer').classList.remove('hidden');
            }

            onHand(res) {
                if (res.multiHandLandmarks?.length > 0) {
                    if (this.state.mode !== 'NEURAL LINK') {
                        this.state.mode = 'NEURAL LINK';
                        document.getElementById('mode-status').innerText = this.state.mode;
                        document.getElementById('mode-status').style.color = 'var(--secondary)';
                    }
                    this.state.autoTimer = performance.now();
                    const lm = res.multiHandLandmarks[0];

                    // Coordinates mapping (camera is -Z forward, X right, Y up initially)
                    this.state.handX = (lm[9].x - 0.5) * 40;
                    this.state.handY = -(lm[9].y - 0.5) * 40;

                    // Pinch
                    let dx = lm[4].x - lm[8].x, dy = lm[4].y - lm[8].y;
                    this.state.targetPinch = Math.max(0.2, 1 + (0.15 - Math.sqrt(dx * dx + dy * dy)) * 5);

                    // Height -> Hue
                    this.state.targetHue = lm[0].y;

                    // Fist vs Open Palm
                    let open = 0;
                    for (let tip of [8, 12, 16, 20]) if (lm[tip].y < lm[tip - 2].y) open++;
                    if (open === 0) this.state.targetForce = -20.0; // Explosion
                    else if (open === 4) this.state.targetForce = 5.0; // Attract
                    else this.state.targetForce = 0;

                    // Swipe logic
                    const now = performance.now();
                    if (!this.lastSwipe) this.lastSwipe = now;
                    if (now - this.lastSwipe > 1000) {
                        let swipeV = lm[9].x - (this.lastHX || lm[9].x);
                        if (Math.abs(swipeV) > 0.05) {
                            this.switchShape(Math.sign(swipeV));
                            this.lastSwipe = now;
                        }
                    }
                    this.lastHX = lm[9].x;

                    // Circular / Vortex if hands moving in circle? Simplification: thumb distance to pinky horizontal
                    let tdist = lm[4].x - lm[20].x;
                    if (tdist > 0.3) this.state.targetVortex = 1.0; else this.state.targetVortex = 0.0;

                } else {
                    this.handleAutoMode();
                }
            }

            handleAutoMode() {
                if (performance.now() - this.state.autoTimer > 4000) {
                    if (this.state.mode !== 'AUTO AI') {
                        this.state.mode = 'AUTO AI';
                        document.getElementById('mode-status').innerText = this.state.mode;
                        document.getElementById('mode-status').style.color = '#fff';
                    }
                    const t = performance.now() * 0.0005;
                    this.state.handX = Math.sin(t) * 15;
                    this.state.handY = Math.cos(t * 1.3) * 10;
                    this.state.targetPinch = 1.0 + Math.sin(t * 0.5) * 0.2;
                    this.state.targetForce = Math.sin(t * 2) * 2.0;
                    this.state.targetHue = (Math.sin(t * 0.2) * 0.5) + 0.5;
                    this.state.targetVortex = Math.sin(t * 0.3) > 0.5 ? 0.5 : 0;

                    // Auto switch every 15s
                    if (t % 15 < 0.02) this.switchShape(1);
                    if ((t + 7.5) % 30 < 0.02) this.cycleTheme();
                } else {
                    this.state.targetForce = 0; this.state.targetVortex = 0; this.state.targetPinch = 1.0;
                }
            }

            loop() {
                requestAnimationFrame(() => this.loop());
                const dt = Math.min(this.clock.getDelta(), 0.1);
                const time = this.clock.getElapsedTime();

                this.audio.update();

                // LPF Smoothing
                this.state.pinch += (this.state.targetPinch - this.state.pinch) * 0.1;
                this.state.force += (this.state.targetForce - this.state.force) * 0.2;
                this.state.hue += (this.state.targetHue - this.state.hue) * 0.05;
                this.state.vortex += (this.state.targetVortex - this.state.vortex) * 0.1;

                const sysVel = this.sys.velUniforms;
                sysVel.uHandPos.value.set(this.state.handX, this.state.handY, 0);
                sysVel.uHandForce.value = this.state.force;
                sysVel.uPinchScale.value = this.state.pinch;
                sysVel.uVortex.value = this.state.vortex;
                sysVel.uAudioData.value.copy(this.audio.data);

                this.sys.material.uniforms.uHueShift.value = this.state.hue;
                this.sys.material.uniforms.uAudioHigh.value = this.audio.data.z;

                // Subtle Camera Float
                this.engine.camera.position.x = Math.sin(time * 0.2) * 3;
                this.engine.camera.position.y = Math.cos(time * 0.15) * 2;
                this.engine.camera.lookAt(0, 0, 0);
                this.engine.stars.rotation.y = time * 0.02;

                this.sys.update(dt, time);
                this.engine.composer.render();

                // FPS
                this.frameCount++;
                if (performance.now() - this.lastFpsTime >= 1000) {
                    document.getElementById('fps-counter').innerText = this.frameCount;
                    this.frameCount = 0; this.lastFpsTime = performance.now();
                }
            }
        }

        window.onload = () => new AppController();
    </script>
</body>

</html>
